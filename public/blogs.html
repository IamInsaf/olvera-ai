<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-6090544760574516">
  <title>All Blogs</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD14-jgQYI4nOnFPNnhFbylbiQZQBOwJ68",
      authDomain: "promgn-in.firebaseapp.com",
      projectId: "promgn-in",
      storageBucket: "promgn-in.appspot.com",
      messagingSenderId: "545429176314",
      appId: "1:545429176314:web:5590c702b55357b4bfae43",
      measurementId: "G-YZQG3ZPQMJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const blogList = document.getElementById('blog-list');

    async function loadBlogs() {
      const querySnapshot = await getDocs(collection(db, "blogs"));
      const blogs = [];

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        blogs.push({ id: doc.id, ...data });
      });

      blogs.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)); // Newest first

      blogs.forEach((blog) => {
        const card = `
          <div class="bg-white shadow rounded-xl p-4 hover:shadow-lg transition">
            <h2 class="text-2xl font-bold text-gray-800">${blog.title}</h2>
            <p class="text-sm text-gray-500 mb-1">By ${blog.author} • ${new Date(blog.updatedAt).toDateString()}</p>
            <p class="text-gray-700 mb-2">${blog.metaDescription}</p>
            <a href="/blogs/${blog.slug}" class="text-blue-600 font-medium hover:underline">Read more →</a>
          </div>
        `;
        blogList.innerHTML += card;
      });
    }

    loadBlogs();
  </script>
</head>
<body class="bg-gray-100">
  <div class="container mx-auto px-4 py-6">
    <h1 class="text-4xl font-bold mb-6 text-center">Latest Blog Posts</h1>
    <div id="blog-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>
</body>
</html>
