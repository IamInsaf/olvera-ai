<html class="scroll-smooth" lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   3D Analysis Options
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
      font-family: 'Poppins', sans-serif;
      background-color: #121212;
      color: #e0e0e0;
    }
    .card-3d {
      perspective: 1200px;
    }
    .card-inner {
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      will-change: transform;
    }
    .card-3d:hover .card-inner {
      transform: rotateY(15deg) rotateX(10deg) scale(1.05);
      box-shadow:
        0 20px 40px rgba(255, 255, 255, 0.15),
        0 0 30px #4f46e5aa,
        0 0 60px #4f46e5cc;
    }
    .card-front,
    .card-back {
      backface-visibility: hidden;
      border-radius: 1rem;
    }
    .card-front {
      position: relative;
      z-index: 2;
    }
    .btn-3d {
      background: linear-gradient(145deg, #4f46e5, #4338ca);
      box-shadow:
        0 4px 15px #4f46e5cc,
        inset 0 -3px 5px #3b32a1;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    .btn-3d:hover {
      background: linear-gradient(145deg, #4338ca, #4f46e5);
      box-shadow:
        0 6px 20px #6d63ffcc,
        inset 0 -4px 7px #3b32a1;
    }
    .btn-3d:active {
      background: linear-gradient(145deg, #3b32a1, #4338ca);
      box-shadow:
        inset 0 3px 5px #2a2370;
      transform: translateY(2px);
    }
    /* subtle floating animation */
    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotateY(0deg) rotateX(0deg);
      }
      50% {
        transform: translateY(-10px) rotateY(5deg) rotateX(3deg);
      }
    }
    .floating {
      animation: float 6s ease-in-out infinite;
    }
  </style>
 </head>
 <body class="min-h-screen flex flex-col justify-center items-center px-6 py-16">
  <h1 class="text-4xl sm:text-5xl font-extrabold mb-12 text-center text-indigo-400 drop-shadow-lg">
   Choose Your Analysis Mode
  </h1>
  <div class="flex flex-col sm:flex-row gap-12 max-w-5xl w-full justify-center">
   <!-- Quick Analyze Card -->
   <button aria-label="Quick Analyze option, less than a minute" class="card-3d w-full sm:w-96 cursor-pointer" onclick="location.href='quick-analyze.html'" type="button">
    <div class="card-inner bg-gradient-to-tr from-indigo-900 via-indigo-800 to-indigo-700 p-8 rounded-3xl shadow-lg floating" style="transform-style: preserve-3d;">
     <div class="card-front flex flex-col items-center text-center space-y-6">
      <img alt="3D stylized cube with fast motion lines representing quick analysis" class="w-36 h-36 mb-4" height="150" loading="lazy" src="https://storage.googleapis.com/a1aa/image/665d3ebe-1def-4e14-931a-0d550ad12301.jpg" width="150"/>
      <h2 class="text-3xl font-bold text-indigo-300">
       Quick Analyze
      </h2>
      <p class="text-indigo-200 text-lg max-w-xs">
       Get results in less than a minute with our lightning-fast analysis.
      </p>
      <div class="btn-3d px-8 py-3 rounded-full text-lg font-semibold text-white shadow-lg select-none">
       Start Now
       <i class="fas fa-bolt ml-3">
       </i>
      </div>
     </div>
    </div>
   </button>
   <!-- Deep Analyze Card -->
   <button aria-label="Deep Analyze option, minimum 7 minutes" class="card-3d w-full sm:w-96 cursor-pointer" onclick="location.href='deep-job.html'" type="button">
    <div class="card-inner bg-gradient-to-tr from-purple-900 via-purple-800 to-purple-700 p-8 rounded-3xl shadow-lg floating" style="animation-delay: 3s; transform-style: preserve-3d;">
     <div class="card-front flex flex-col items-center text-center space-y-6">
      <img alt="3D stylized layered spheres representing deep and thorough analysis" class="w-36 h-36 mb-4" height="150" loading="lazy" src="https://storage.googleapis.com/a1aa/image/aa34cffd-24b6-485b-5c26-66de40d569c7.jpg" width="150"/>
      <h2 class="text-3xl font-bold text-purple-300">
       Deep Analyze
      </h2>
      <p class="text-purple-200 text-lg max-w-xs">
       Dive deep with a comprehensive analysis taking a minimum of 7 minutes.
      </p>
      <div class="btn-3d px-8 py-3 rounded-full text-lg font-semibold text-white shadow-lg select-none">
       Start Deep
       <i class="fas fa-brain ml-3">
       </i>
      </div>
     </div>
    </div>
   </button>
  </div>
 </body>
</html>
