<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interview Results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 600px; margin: auto; text-align: center; }
    #timer { font-size: 2rem; margin-top: 1rem; color: #e63946; }
    #ad-container { margin-top: 2rem; height: 100px; background: #f1f1f1; display: flex; align-items: center; justify-content: center; }
    #results { display: none; margin-top: 2rem; text-align: left; }
    .question-block { margin-bottom: 1rem; padding: 1rem; background: #f9f9f9; border-radius: 10px; }
  </style>
  <!-- AdSense placeholder -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
</head>
<body>
  <h2>Your Interview Results</h2>
  <p>Analyzing your responses. Please wait...</p>
  <div id="timer">30</div>

  <!-- Ad Section -->
  <div id="ad-container">
    <!-- Replace this with your actual ad unit -->
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <!-- Result Section -->
  <div id="results"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD14-jgQYI4nOnFPNnhFbylbiQZQBOwJ68",
      authDomain: "promgn-in.firebaseapp.com",
      projectId: "promgn-in",
      storageBucket: "Olvera",
      messagingSenderId: "545429176314",
      appId: "1:545429176314:web:5590c702b55357b4bfae43",
      measurementId: "G-YZQG3ZPQMJ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let sessionId = localStorage.getItem('sessionId');

    // Countdown logic
    let timeLeft = 30;
    const timerEl = document.getElementById("timer");

    const countdown = setInterval(() => {
      timeLeft--;
      timerEl.innerText = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(countdown);
        timerEl.style.display = "none";
        document.getElementById("ad-container").style.display = "none";
        loadResults();
      }
    }, 1000);

    async function loadResults() {
      const resultsContainer = document.getElementById("results");
      resultsContainer.style.display = "block";

      const snapshot = await db.collection("interviews").doc(sessionId).collection("responses").orderBy("timestamp").get();

      snapshot.forEach(doc => {
        const { question, answer, gaze } = doc.data();
        const block = document.createElement("div");
        block.className = "question-block";
        block.innerHTML = `
          <strong>${question}</strong><br>
          <em>Answer:</em> ${answer}<br>
          <em>Gaze:</em> ${gaze ? `x: ${Math.round(gaze.x)}, y: ${Math.round(gaze.y)}` : "Not captured"}
        `;
        resultsContainer.appendChild(block);
      });
    }

    firebase.auth().signInAnonymously();
  </script>
</body>
</html>
