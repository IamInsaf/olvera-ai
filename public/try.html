<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Questionnaire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      font-style: italic;
    }
    .progress-bar {
      height: 6px;
      background-color: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background-color: #4f46e5;
      transition: width 0.3s ease;
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .shake {
      animation: shake 0.5s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-6 fade-in">
    <div class="text-center mb-4">
      <i class="fas fa-user-edit text-indigo-600 text-4xl mb-2"></i>
      <h1 class="text-2xl font-semibold text-gray-800 italic">Personal Questionnaire</h1>
      <p class="text-gray-600 mt-2 italic">Share your thoughts with us</p>
    </div>
    <form id="userForm" class="flex flex-col space-y-4">
      <div class="space-y-2">
        <label for="userInput" class="text-gray-700 italic text-lg">Enter your name:</label>
        <input
          type="text"
          id="userInput"
          name="userInput"
          required
          placeholder="Your name"
          class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 italic"
          autocomplete="off"
        />
      </div>
      <button
        type="submit"
        class="bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition italic flex items-center justify-center space-x-2"
      >
        <span>Start Questionnaire</span>
        <i class="fas fa-arrow-right"></i>
      </button>
    </form>
  </div>

  <!-- Modal backdrop -->
  <div
    id="modalBackdrop"
    class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4"
  >
    <!-- Modal container -->
    <div
      class="bg-white rounded-lg shadow-xl max-w-lg w-full p-6 flex flex-col fade-in"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >
      <div class="flex justify-between items-center mb-4">
        <h2 id="modalTitle" class="text-xl font-semibold italic text-gray-800 flex items-center">
          <i class="fas fa-question-circle text-indigo-600 mr-2"></i>
          <span>Question</span>
        </h2>
        <button id="closeModal" class="text-gray-500 hover:text-gray-700">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <div class="progress-bar mb-4">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      
      <div class="mb-6">
        <p id="questionText" class="italic text-gray-800 text-lg min-h-[4rem] fade-in"></p>
      </div>
      
      <textarea
        id="answerInput"
        rows="4"
        placeholder="Type your answer here..."
        class="w-full border border-gray-300 rounded-md p-3 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 italic"
      ></textarea>
      
      <div class="mt-6 flex justify-between items-center">
        <button
          id="prevBtn"
          class="text-indigo-600 px-4 py-2 rounded-md hover:bg-indigo-50 transition italic flex items-center disabled:opacity-50 disabled:cursor-not-allowed"
          disabled
        >
          <i class="fas fa-arrow-left mr-2"></i>
          <span>Previous</span>
        </button>
        
        <span id="questionCounter" class="italic text-gray-600"></span>
        
        <button
          id="nextBtn"
          class="bg-indigo-600 text-white px-5 py-2 rounded-md hover:bg-indigo-700 transition italic flex items-center"
        >
          <span id="nextBtnText">Next</span>
          <i class="fas fa-arrow-right ml-2"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Completion Modal -->
  <div id="completionModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6 text-center">
      <div class="text-green-500 text-5xl mb-4">
        <i class="fas fa-check-circle"></i>
      </div>
      <h2 class="text-2xl font-semibold mb-2 italic text-gray-800">Questionnaire Complete!</h2>
      <p class="text-gray-600 mb-6 italic">Thank you for sharing your thoughts with us.</p>
      <button id="restartBtn" class="bg-indigo-600 text-white px-5 py-2 rounded-md hover:bg-indigo-700 transition italic">
        Start New Questionnaire
      </button>
    </div>
  </div>

  <script>
    const questions = [
      "What motivates you the most in life?",
      "Describe a challenge you recently overcame.",
      "What is your favorite hobby and why?",
      "Where do you see yourself in five years?",
      "What is one thing you want to learn this year?"
    ];

    // DOM elements
    const userForm = document.getElementById("userForm");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const questionText = document.getElementById("questionText");
    const answerInput = document.getElementById("answerInput");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const questionCounter = document.getElementById("questionCounter");
    const progressFill = document.getElementById("progressFill");
    const closeModal = document.getElementById("closeModal");
    const completionModal = document.getElementById("completionModal");
    const restartBtn = document.getElementById("restartBtn");
    const nextBtnText = document.getElementById("nextBtnText");

    let currentQuestionIndex = 0;
    let answers = [];
    let userName = "";

    // Event listeners
    userForm.addEventListener("submit", (e) => {
      e.preventDefault();
      userName = document.getElementById("userInput").value.trim();
      if (!userName) {
        alert("Please enter your name before starting.");
        return;
      }
      startQuestionnaire();
    });

    nextBtn.addEventListener("click", () => {
      const answer = answerInput.value.trim();
      if (answer === "") {
        showValidationError();
        return;
      }
      
      answers[currentQuestionIndex] = answer;
      
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        showQuestion(currentQuestionIndex);
        answerInput.value = answers[currentQuestionIndex] || "";
      } else {
        completeQuestionnaire();
      }
      
      updateNavigationButtons();
      answerInput.focus();
    });

    prevBtn.addEventListener("click", () => {
      answers[currentQuestionIndex] = answerInput.value.trim();
      currentQuestionIndex--;
      showQuestion(currentQuestionIndex);
      answerInput.value = answers[currentQuestionIndex] || "";
      updateNavigationButtons();
      answerInput.focus();
    });

    closeModal.addEventListener("click", () => {
      if (confirm("Are you sure you want to cancel the questionnaire? Your progress will be lost.")) {
        resetQuestionnaire();
      }
    });

    restartBtn.addEventListener("click", () => {
      completionModal.classList.add("hidden");
      userForm.reset();
      document.getElementById("userInput").focus();
    });

    // Functions
    function startQuestionnaire() {
      currentQuestionIndex = 0;
      answers = [];
      showQuestion(currentQuestionIndex);
      modalBackdrop.classList.remove("hidden");
      answerInput.value = "";
      updateNavigationButtons();
      answerInput.focus();
      updateProgressBar();
    }

    function showQuestion(index) {
      questionText.classList.remove("fade-in");
      setTimeout(() => {
        questionText.textContent = questions[index];
        questionText.classList.add("fade-in");
      }, 10);
      
      questionCounter.textContent = `${index + 1}/${questions.length}`;
      nextBtnText.textContent = index === questions.length - 1 ? "Submit" : "Next";
      updateProgressBar();
    }

    function updateNavigationButtons() {
      prevBtn.disabled = currentQuestionIndex === 0;
    }

    function completeQuestionnaire() {
      modalBackdrop.classList.add("hidden");
      completionModal.classList.remove("hidden");
      
      // In a real app, you might send the data to a server here
      console.log("User:", userName);
      console.log("Answers:", answers);
    }

    function resetQuestionnaire() {
      modalBackdrop.classList.add("hidden");
      completionModal.classList.add("hidden");
      userForm.reset();
    }

    function updateProgressBar() {
      const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
      progressFill.style.width = `${progress}%`;
    }

    function showValidationError() {
      answerInput.classList.add("shake", "border-red-500");
      answerInput.focus();
      setTimeout(() => {
        answerInput.classList.remove("shake", "border-red-500");
      }, 500);
    }

    // Initialize
    updateProgressBar();
  </script>
</body>
</html>
