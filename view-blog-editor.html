<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="blockchain" content="none"> <!-- Prevent wallet injection -->
    <title>View Blog Posts</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        /* Your existing CSS styles remain unchanged */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        .blog-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .blog-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .blog-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .blog-content {
            padding: 15px;
        }
        .blog-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .blog-meta {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        .blog-description {
            margin-bottom: 15px;
            color: #34495e;
        }
        .action-buttons {
            display: flex;
            justify-content: space-between;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .view-btn {
            background-color: #3498db;
            color: white;
        }
        .download-btn {
            background-color: #2ecc71;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow: auto;
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            width: 80%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
        }
        .close-btn {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <h1>Blog Posts</h1>
    
    <div id="blogContainer" class="blog-list">
        <div class="loading">Loading blogs...</div>
    </div>
    
    <div id="blogModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modalTitle"></h2>
            <p class="blog-meta" id="modalMeta"></p>
            <img id="modalImage" class="blog-image" style="margin: 15px 0;">
            <div id="modalContent"></div>
            <div style="margin-top: 20px;">
                <button id="downloadHtmlBtn" class="download-btn">Download as HTML</button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let db;
        let currentBlog = null;
        let allBlogs = [];

        // Initialize the application
        function initializeApp() {
            // Disable wallet injections
            disableWalletInjections();
            
            // Initialize Firebase
            initializeFirebase();
            
            // Set up event listeners
            setupEventListeners();
            
            // Load blogs
            fetchBlogs();
        }

        // Prevent wallet injection conflicts
        function disableWalletInjections() {
            if (window.ethereum || window.BinanceChain) {
                console.log('Web3 wallet detected - disabling potential conflicts');
                window.ethereum = undefined;
                window.BinanceChain = undefined;
            }
        }

        // Initialize Firebase
        function initializeFirebase() {
            const firebaseConfig = {
                apiKey: "AIzaSyD14-jgQYI4nOnFPNnhFbylbiQZQBOwJ68",
                authDomain: "promgn-in.firebaseapp.com",
                projectId: "promgn-in",
                storageBucket: "cracksit",
                messagingSenderId: "545429176314",
                appId: "1:545429176314:web:5590c702b55357b4bfae43",
                measurementId: "G-YZQG3ZPQMJ"
            };
            
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                db = firebase.firestore();
            } catch (error) {
                console.error("Firebase initialization error:", error);
                document.getElementById('blogContainer').innerHTML = 
                    '<div class="loading">Error initializing Firebase. Check console.</div>';
            }
        }

        // Set up all event listeners
        function setupEventListeners() {
            const closeBtn = document.querySelector('.close-btn');
            const downloadHtmlBtn = document.getElementById('downloadHtmlBtn');
            const blogContainer = document.getElementById('blogContainer');
            
            // Modal close button
            closeBtn.addEventListener('click', () => {
                document.getElementById('blogModal').style.display = 'none';
            });
            
            // Close modal when clicking outside
            window.addEventListener('click', (e) => {
                if (e.target === document.getElementById('blogModal')) {
                    document.getElementById('blogModal').style.display = 'none';
                }
            });
            
            // Download button in modal
            downloadHtmlBtn.addEventListener('click', () => {
                if (currentBlog) {
                    downloadBlog(currentBlog.id);
                }
            });
            
            // Event delegation for blog cards
            blogContainer.addEventListener('click', function(e) {
                if (e.target.classList.contains('view-btn')) {
                    const blogId = e.target.getAttribute('data-id');
                    openModal(blogId);
                }
                
                if (e.target.classList.contains('download-btn')) {
                    const blogId = e.target.getAttribute('data-id');
                    downloadBlog(blogId);
                }
            });
        }

        // Fetch blogs from Firestore
        function fetchBlogs() {
            const blogContainer = document.getElementById('blogContainer');
            blogContainer.innerHTML = '<div class="loading">Loading blogs...</div>';
            
            db.collection('blogs').orderBy('createdAt', 'desc').get()
                .then((querySnapshot) => {
                    allBlogs = [];
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        // Ensure all required fields exist
                        const blog = {
                            id: doc.id,
                            title: safeAccess(data, 'title', 'Untitled Blog'),
                            author: safeAccess(data, 'author', 'Unknown Author'),
                            metaDescription: safeAccess(data, 'metaDescription', 'No description available'),
                            content: safeAccess(data, 'content', ''),
                            imageUrl: safeAccess(data, 'imageUrl', ''),
                            keywords: Array.isArray(data.keywords) ? data.keywords : [],
                            slug: safeAccess(data, 'slug', 'blog'),
                            createdAt: data.createdAt || firebase.firestore.FieldValue.serverTimestamp()
                        };
                        allBlogs.push(blog);
                    });
                    renderBlogs(allBlogs);
                })
                .catch((error) => {
                    console.error("Error loading blogs:", error);
                    blogContainer.innerHTML = `<div class="loading">Error loading blogs. Please try again later.</div>`;
                });
        }
        
        // Safe data access helper
        function safeAccess(obj, path, defaultValue = '') {
            return path.split('.').reduce((o, p) => (o && o[p] !== undefined ? o[p] : defaultValue), obj);
        }

        // Render blogs to the page with safe data access
        function renderBlogs(blogs) {
            const blogContainer = document.getElementById('blogContainer');
            
            if (!blogs || blogs.length === 0) {
                blogContainer.innerHTML = '<div class="loading">No blogs found</div>';
                return;
            }
            
            blogContainer.innerHTML = '';
            
            blogs.forEach(blog => {
                const blogCard = document.createElement('div');
                blogCard.className = 'blog-card';
                
                // Safely access all properties
                const shortDescription = blog.metaDescription 
                    ? blog.metaDescription.substring(0, 100) + (blog.metaDescription.length > 100 ? '...' : '')
                    : 'No description available';
                
                const date = blog.createdAt 
                    ? new Date(blog.createdAt.toDate ? blog.createdAt.toDate() : blog.createdAt).toLocaleDateString() 
                    : 'Unknown date';
                
                blogCard.innerHTML = `
                    <img src="${blog.imageUrl || 'https://via.placeholder.com/300x200?text=No+Image'}" 
                         class="blog-image" 
                         alt="${blog.title || 'Blog post'}">
                    <div class="blog-content">
                        <h3 class="blog-title">${blog.title || 'Untitled Blog'}</h3>
                        <div class="blog-meta">By ${blog.author || 'Unknown Author'} • ${date}</div>
                        <p class="blog-description">${shortDescription}</p>
                        <div class="action-buttons">
                            <button class="view-btn" data-id="${blog.id}">View</button>
                            <button class="download-btn" data-id="${blog.id}">Download</button>
                        </div>
                    </div>
                `;
                
                blogContainer.appendChild(blogCard);
            });
        }
        
        // Open modal with full blog content
        function openModal(blogId) {
            const blog = allBlogs.find(b => b.id === blogId);
            if (!blog) {
                console.error("Blog not found:", blogId);
                return;
            }
            
            currentBlog = blog;
            const modal = document.getElementById('blogModal');
            
            document.getElementById('modalTitle').textContent = blog.title || 'Untitled Blog';
            document.getElementById('modalMeta').textContent = `By ${blog.author || 'Unknown Author'} • ${
                blog.createdAt 
                    ? new Date(blog.createdAt.toDate ? blog.createdAt.toDate() : blog.createdAt).toLocaleDateString() 
                    : 'Unknown date'
            }`;
            document.getElementById('modalImage').src = blog.imageUrl || 'https://via.placeholder.com/800x400?text=No+Image';
            document.getElementById('modalImage').alt = blog.title || 'Blog post';
            document.getElementById('modalContent').innerHTML = blog.content || '<p>No content available</p>';
            
            modal.style.display = 'block';
        }
        
        // Download blog as HTML file
        function downloadBlog(blogId) {
            const blog = allBlogs.find(b => b.id === blogId);
            if (!blog) {
                console.error("Blog not found for download:", blogId);
                return;
            }
            
            // Create HTML content with safe defaults
            const htmlContent = `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-6090544760574516">
    <meta name="description" content="${blog.metaDescription || 'Blog post'}">
    <meta name="keywords" content="${Array.isArray(blog.keywords) ? blog.keywords.join(', ') : ''}">
    <meta name="author" content="${blog.author || 'Unknown Author'}">
    <title>${blog.title || 'Untitled Blog'}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        .blog-header {
            margin-bottom: 30px;
        }
        .blog-title {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .blog-meta {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .featured-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .blog-content {
            line-height: 1.8;
        }
        .blog-content img {
            max-width: 100%;
            height: auto;
        }
    </style>
    
</head>
<body>
    <div class="blog-header">
        <h1 class="blog-title">${blog.title || 'Untitled Blog'}</h1>
        <div class="blog-meta">
            By ${blog.author || 'Unknown Author'} • ${
                blog.createdAt 
                    ? new Date(blog.createdAt.toDate ? blog.createdAt.toDate() : blog.createdAt).toLocaleDateString() 
                    : 'Unknown date'
            }
        </div>
        <img src="${blog.imageUrl || 'https://via.placeholder.com/800x400?text=No+Image'}" 
             class="featured-image" 
             alt="${blog.title || 'Blog post'}">
    </div>
    <div class="blog-content">
        ${blog.content || '<p>No content available</p>'}
    </div>
</body>
</html>
            `;
            
            // Create download link
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${blog.slug || 'blog'}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Start the application when DOM is loaded
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
